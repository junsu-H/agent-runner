services:
  backend:
    build: ./backend
    container_name: agent-runner-backend
    ports:
      - "19876:19876"
    volumes:
      - ./skills:/app/skills
      - ./runs:/app/runs
      - ./data:/app/data
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - AGENT_RUNNER_DOCKER=true
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agent-runner-frontend
    ports:
      - "15432:80"
    depends_on:
      - backend
    restart: unless-stopped
